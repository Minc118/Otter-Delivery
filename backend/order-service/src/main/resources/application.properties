server.port=8002

restaurant.service.url=${RESTAURANT_SERVICE_URL:http://localhost:8001}

spring.datasource.url=${ORDER_DATABASE_URL:jdbc:h2:mem:orders;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${ORDER_DATABASE_USERNAME:sa}
spring.datasource.password=${ORDER_DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
