name: CI

on:
  pull_request:
  push:

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Build the Vite app only; Vercel remains responsible for deployment.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  driver-service:
    name: Driver service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/driver-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Driver tests use in-memory and mocked repository paths, not production databases.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/driver-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  recommendation-service:
    name: Recommendation service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/recommendation-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Recommendation tests use unittest with mocked/in-memory dependencies.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/recommendation-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

  spring-services:
    name: Spring Boot service tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - restaurant-service
          - order-service
          - profile-service
          - translation-service
    env:
      # Keep CI self-contained. Order-service context tests use H2 instead of Supabase/PostgreSQL.
      ORDER_DATABASE_URL: jdbc:h2:mem:orders-ci;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      ORDER_DATABASE_USERNAME: sa
      ORDER_DATABASE_PASSWORD: ""
      RESTAURANT_SERVICE_URL: http://localhost:8001
      MAVEN_OPTS: -Djdk.attach.allowAttachSelf=true -XX:+EnableDynamicAgentLoading
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Java 21 is LTS and compatible with the services' Java 17 source target.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        working-directory: backend/${{ matrix.service }}
        run: mvn -B test

      # Services that need external databases should add local containers or test profiles later.
      # This workflow intentionally has no deployment, image push, or production credential steps.
