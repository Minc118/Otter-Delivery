services:
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      VITE_DRIVER_API_URL: http://localhost:${DRIVER_SERVICE_PORT:-8003}
      VITE_RESTAURANT_SERVICE_URL: http://localhost:${RESTAURANT_SERVICE_PORT:-8001}
      VITE_ORDER_SERVICE_URL: http://localhost:${ORDER_SERVICE_PORT:-8002}
      VITE_PROFILE_SERVICE_URL: http://localhost:${PROFILE_SERVICE_PORT:-8006}
      VITE_RECOMMENDATION_API_URL: http://localhost:${RECOMMENDATION_SERVICE_PORT:-8004}
      VITE_RECOMMENDATION_SERVICE_URL: http://localhost:${RECOMMENDATION_SERVICE_PORT:-8004}
      VITE_TRANSLATION_SERVICE_URL: http://localhost:${TRANSLATION_SERVICE_PORT:-8005}
    depends_on:
      - restaurant-service
      - order-service
      - profile-service
      - driver-service
      - recommendation-service
      - translation-service


  restaurant-service:
    platform: linux/amd64
    build:
      context: ./backend/restaurant-service
    ports:
      - "${RESTAURANT_SERVICE_PORT:-8001}:8001"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SEED_DEMO_DATA: "true"
      SERVER_PORT: 8001
      RESTAURANT_DATABASE_URL: ${RESTAURANT_DATABASE_URL}
      RESTAURANT_DATABASE_USERNAME: ${RESTAURANT_DATABASE_USERNAME}
      RESTAURANT_DATABASE_PASSWORD: ${RESTAURANT_DATABASE_PASSWORD}


  order-service:
    build:
      context: ./backend/order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8002}:8002"
    environment:
      SERVER_PORT: 8002
      RESTAURANT_SERVICE_URL: http://restaurant-service:8001
      # Added isolated database credentials for the Order Service
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      ORDER_DATABASE_USERNAME: ${ORDER_DATABASE_USERNAME}
      ORDER_DATABASE_PASSWORD: ${ORDER_DATABASE_PASSWORD}
    depends_on:
      - restaurant-service

  driver-service:
    build:
      context: ./backend/driver-service
    ports:
      - "${DRIVER_SERVICE_PORT:-8003}:8003"
    environment:
      PORT: 8003
      DRIVER_REPOSITORY_MODE: ${DRIVER_REPOSITORY_MODE:-memory}
      DRIVER_DATABASE_URL: ${DRIVER_DATABASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ETA_MINUTES: 40
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_ROUTES_API_KEY: ${GOOGLE_ROUTES_API_KEY:-}

  profile-service:
    build:
      context: ./backend/profile-service
    ports:
      - "${PROFILE_SERVICE_PORT:-8006}:8006"
    environment:
      SERVER_PORT: 8006
      ORDER_SERVICE_URL: http://order-service:8002
      PROFILE_DATABASE_URL: ${PROFILE_DATABASE_URL:-jdbc:h2:mem:profiles;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
      PROFILE_DATABASE_USERNAME: ${PROFILE_DATABASE_USERNAME:-sa}
      PROFILE_DATABASE_PASSWORD: ${PROFILE_DATABASE_PASSWORD:-}
    depends_on:
      - order-service

  recommendation-service:
    build:
      context: ./backend/recommendation-service
    ports:
      - "${RECOMMENDATION_SERVICE_PORT:-8004}:8004"
    environment:
      PORT: 8004
      RECOMMENDATION_DATABASE_URL: ${RECOMMENDATION_DATABASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_CANDIDATE_LIMIT: ${GEMINI_CANDIDATE_LIMIT:-5}
      GEMINI_MENU_ITEM_LIMIT: ${GEMINI_MENU_ITEM_LIMIT:-3}
      RESTAURANT_SERVICE_URL: http://restaurant-service:8001
    depends_on:
      - restaurant-service

  translation-service:
    build:
      context: ./backend/translation-service
    ports:
      - "${TRANSLATION_SERVICE_PORT:-8005}:8005"
    environment:
      SERVER_PORT: 8005
      RESTAURANT_SERVICE_BASE_URL: http://restaurant-service:8001/api
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      DEEPL_BASE_URL: ${DEEPL_BASE_URL:-https://api-free.deepl.com/v2/translate}
    depends_on:
      - restaurant-service


volumes:
  frontend_node_modules: